<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">EduAdmin</span>
    </div>
    <nav class="sidebar-nav">
        <a href="/" class="nav-link">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="/new" class="nav-link">
            <span class="nav-icon">➕</span> Add Student
        </a>
    </nav>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <div class="topbar">
        <h1 class="page-title">Edit Student</h1>
        <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
    </div>

    <div class="form-container">
        <div class="card form-card">
            <div class="card-header">
                <h2 class="card-title">Update Student Details</h2>
                <span class="card-subtitle">Modify the fields and click Update</span>
            </div>

            <form th:action="@{/update/{id}(id=${student.id})}" th:object="${student}" method="post" class="student-form">

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" th:field="*{name}" required />
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" th:field="*{email}" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Course</label>
                        <select th:field="*{course}" required>
                            <option value="">-- Select Course --</option>
                            <option value="Computer Science" th:selected="${student.course == 'Computer Science'}">Computer Science</option>
                            <option value="Electronics" th:selected="${student.course == 'Electronics'}">Electronics</option>
                            <option value="Mechanical" th:selected="${student.course == 'Mechanical'}">Mechanical</option>
                            <option value="Civil" th:selected="${student.course == 'Civil'}">Civil</option>
                            <option value="MBA" th:selected="${student.course == 'MBA'}">MBA</option>
                            <option value="BBA" th:selected="${student.course == 'BBA'}">BBA</option>
                            <option value="Mathematics" th:selected="${student.course == 'Mathematics'}">Mathematics</option>
                            <option value="Physics" th:selected="${student.course == 'Physics'}">Physics</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" th:field="*{phone}" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{status}" required>
                            <option value="Active" th:selected="${student.status == 'Active'}">Active</option>
                            <option value="Inactive" th:selected="${student.status == 'Inactive'}">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Student</button>
                    <a th:href="@{/delete/{id}(id=${student.id})}"
                       onclick="return confirm('Are you sure you want to delete this student?')"
                       class="btn btn-delete">Delete Student</a>
                </div>

            </form>
        </div>
    </div>

</div>
</body>
</html>
