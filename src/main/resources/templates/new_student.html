<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">EduAdmin</span>
    </div>
    <nav class="sidebar-nav">
        <a href="/" class="nav-link">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="/new" class="nav-link active">
            <span class="nav-icon">➕</span> Add Student
        </a>
    </nav>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <div class="topbar">
        <h1 class="page-title">Add New Student</h1>
        <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
    </div>

    <div class="form-container">
        <div class="card form-card">
            <div class="card-header">
                <h2 class="card-title">Student Information</h2>
                <span class="card-subtitle">Fill in all the details below</span>
            </div>

            <form th:action="@{/save}" th:object="${student}" method="post" class="student-form">

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" th:field="*{name}" placeholder="e.g. Ravi Kumar" required />
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" th:field="*{email}" placeholder="e.g. ravi@example.com" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Course</label>
                        <select th:field="*{course}" required>
                            <option value="">-- Select Course --</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="MBA">MBA</option>
                            <option value="BBA">BBA</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" th:field="*{phone}" placeholder="e.g. 9876543210" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{status}" required>
                            <option value="">-- Select Status --</option>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Student</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>

            </form>
        </div>
    </div>

</div>
</body>
</html>
